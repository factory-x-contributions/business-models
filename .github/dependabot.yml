
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
    commit-message:
      prefix: "deps"
      include: "scope"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    labels:
      - "dependency-update"
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
      mui:
        patterns:
          - "@mui/*"
          - "@emotion/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    commit-message:
      prefix: "actions"
      include: "scope"
    open-pull-requests-limit: 2
    rebase-strategy: "auto"
    labels:
      - "github-actions"

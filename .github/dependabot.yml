
version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "07:00"
    commit-message:
      prefix: "deps"
      include: "scope"
    open-pull-requests-limit: 3
    rebase-strategy: "auto"
    labels:
      - "gradle"
      - "dependency-update"
    groups:
      gradle-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    commit-message:
      prefix: "actions"
      include: "scope"
    open-pull-requests-limit: 2
    rebase-strategy: "auto"
    labels:
           - "github-actions"
